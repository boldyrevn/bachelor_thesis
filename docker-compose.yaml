services:
  # PostgreSQL - Metadata Database
  postgres:
    image: postgres:14-alpine
    container_name: flowforge-postgres
    environment:
      POSTGRES_USER: flowforge
      POSTGRES_PASSWORD: flowforge_secret
      POSTGRES_DB: flowforge
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowforge-network

  # Redis - Celery Broker
  redis:
    image: redis:7-alpine
    container_name: flowforge-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowforge-network

  # MinIO - S3 Compatible Storage
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: flowforge-minio
    environment:
      MINIO_ROOT_USER: flowforge_admin
      MINIO_ROOT_PASSWORD: flowforge_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowforge-network

  # Create MinIO buckets on startup
  minio-init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: flowforge-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 flowforge_admin flowforge_secret;
      mc mb myminio/artifacts --ignore-existing;
      mc mb myminio/models --ignore-existing;
      exit 0;
      "
    networks:
      - flowforge-network

  # Spark Master
  spark-master:
    image: apache/spark:3.5.0
    container_name: flowforge-spark-master
    hostname: spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      - AWS_ACCESS_KEY_ID=flowforge_admin
      - AWS_SECRET_ACCESS_KEY=flowforge_secret
      - AWS_REGION=us-east-1
    networks:
      - flowforge-network

  # Spark Worker
  spark-worker:
    image: apache/spark:3.5.0
    container_name: flowforge-spark-worker
    depends_on:
      - spark-master
    command: >
      /opt/spark/bin/spark-class
      org.apache.spark.deploy.worker.Worker
      spark://spark-master:7077
    ports:
      - "8081:8081"
    environment:
      - AWS_ACCESS_KEY_ID=flowforge_admin
      - AWS_SECRET_ACCESS_KEY=flowforge_secret
      - AWS_REGION=us-east-1
    networks:
      - flowforge-network

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowforge-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://flowforge:flowforge_secret@postgres:5432/flowforge
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=flowforge_admin
      - MINIO_SECRET_KEY=flowforge_secret
      - SPARK_MASTER=spark://spark-master:7077
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - flowforge-network

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: flowforge-celery-worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    environment:
      - DATABASE_URL=postgresql+asyncpg://flowforge:flowforge_secret@postgres:5432/flowforge
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=flowforge_admin
      - MINIO_SECRET_KEY=flowforge_secret
      - SPARK_MASTER=spark://spark-master:7077
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      spark-master:
        condition: service_started
    volumes:
      - ./backend:/app
    networks:
      - flowforge-network

  # Frontend - React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: flowforge-frontend
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - flowforge-network

volumes:
  postgres_data:
  minio_data:

networks:
  flowforge-network:
    driver: bridge
